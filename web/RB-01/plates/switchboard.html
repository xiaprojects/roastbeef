<div ui-content-for="title">Switchboard</div>
<span class="switchBoardButton {{scrollItemCounter==$index?'keypadSelectedYes':'keypadSelectedNo'}}"
    ng-repeat="item in switches" ng-click="sendCommand($index)">
    <div style="height: 8px;"></div>
        <span>{{item.Name}}</span>
    <div style="height: 8px;"></div>
        <span class="switchBoardButtonLight switchButtonStatus{{item.Status}}"></span>
    <div style="height: 8px;"></div>
</span>
