context.objects = [
    {
        factory = adapter
        args = {
            factory.name = api.alsa.pcm.sink
            node.name = "waydroid-alsa"
            node.description = "Waydroid ALSA Output"
            media.class = "Audio/Sink"
            api.alsa.path = "default"
            audio.rate = 44100
            audio.channels = 2
            audio.position = [FL FR]
            # Buffering and latency
            api.alsa.period.size = 512        # 512 frames per period
            api.alsa.periods = 4             # 4 periods → 2048 frames total
            api.alsa.add_ts_info = true      # enable timestamps for smoother sync

            # Priority so it can be a sensible default
            node.priority.session = 900
            node.auto-profile = true            
        }
    }
]